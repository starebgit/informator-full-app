# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: production

on:
  pull_request:
    branches: ['production']

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [18.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        env:
          NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
          OPENSSL_CONF: /home/webserver/.configs/openssl.cnf
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install NPM 6
        run: npm install -g npm@6
      - name: Set cafile
        run: npm config set cafile "/etc/ssl/certs/BFITS-RootCA.pem"
      - name: Install dependencies
        run: npm ci
      - run: find /home/webserver/production/informatorApi -mindepth 1 -maxdepth 1 -not -name public -exec rm -rf '{}' \;
      - run: cp -r $GITHUB_WORKSPACE/* /home/webserver/production/informatorApi/
